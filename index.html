<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafael Corretor - Controle de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
  :root {
    --bg: #000;
    --bg2: #1a1a1a;
    --white: #fff;
    --muted: #a0a0a0;
    --silver: #c0c0c0;
    --border: rgba(255,255,255,0.08);
    --green: #88ff88;
    --red: #ff8888;
    --radius: 20px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo h1 { font-family: 'Playfair Display', serif; font-size: 20px; }
  .logo span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  #headerDate { font-size: 12px; color: #666; text-align: right; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 100px; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase;
    margin: 28px 0 14px;
  }

  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 640px) { .kpi-grid { grid-template-columns: 1fr; } }

  .kpi-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 22px 20px;
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }

  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #333, var(--silver));
  }

  .kpi-label { font-size: 11px; color: #888; letter-spacing: 0.5px; }
  .kpi-value { font-family: 'Playfair Display', serif; font-size: 26px; margin-top: 8px; line-height: 1.2; }

  .actions-bar { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
  .btn-action {
    padding: 10px 18px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--bg2); color: var(--white);
    cursor: pointer; font-size: 13px; font-weight: 700;
  }

  .table-wrap { background: var(--bg2); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .table-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .search-input { border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 16px; background: var(--bg); color: var(--white); outline: none; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 12px 14px; text-align: left; color: var(--muted); background: var(--bg); font-weight: 700; }
  tbody td { padding: 13px 14px; border-top: 1px solid var(--border); }

  .profit-pos { color: var(--green) !important; font-weight: 700; }
  .profit-neg { color: var(--red) !important; font-weight: 700; }

  .badge { padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(255,255,255,0.1); }

  .fab {
    position: fixed; bottom: 28px; right: 24px; z-index: 100;
    background: var(--white); color: #000; border: none;
    border-radius: 56px; padding: 16px 26px; font-weight: 700; cursor: pointer;
  }

  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }
  .modal { background: var(--bg2); width: 100%; max-width: 520px; padding: 30px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.15); }
  
  .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  
  input, select { padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: var(--white); font-size: 14px; width: 100%; }
  
  /* Estilo para garantir que o calendário apareça */
  input[type="date"] { cursor: pointer; color-scheme: dark; }

  .input-currency-wrap { position: relative; }
  .input-currency-wrap::before { content: 'R$'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-weight: 700; }
  .input-currency-wrap input { padding-left: 36px; text-align: right; }

  .btn-save { width: 100%; padding: 15px; background: var(--white); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .btn-delete { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; font-weight: 700; display: none; z-index: 999; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div><h1>Rafael</h1><span>Corretor de Imóveis</span></div>
  </div>
  <div id="headerDate"></div>
</header>

<main>
  <p class="section-title">Resumo</p>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">💰 Lucro Acumulado</div>
      <div class="kpi-value" id="kpiProfit">R$ 0,00</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🏢 Tipo Mais Vendido</div>
      <div class="kpi-value" id="kpiTopType">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🕰️ Média Recebimento</div>
      <div class="kpi-value" id="kpiAvgDays">— dias</div>
    </div>
  </div>

  <div class="actions-bar">
    <button class="btn-action" onclick="exportExcel()">📊 Exportar Excel</button>
    <button class="btn-action" style="color:var(--green)" onclick="document.getElementById('importFile').click()">📥 Importar</button>
    <input type="file" id="importFile" style="display:none" accept=".xlsx,.xls" onchange="importExcel(event)">
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3>Histórico</h3>
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar..." oninput="renderTable()">
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Imóvel</th>
            <th>Tipo</th>
            <th>Valor Imóvel</th>
            <th>Comissão</th>
            <th>Gastos</th>
            <th>Lucro</th>
            <th>Venda</th>
            <th>Receb.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="salesTableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<button class="fab" onclick="openModal()">＋ Novo Negócio</button>

<div class="overlay" id="overlay" onclick="if(event.target.id==='overlay') closeModal()">
  <div class="modal">
    <h2>Novo Registro</h2>
    <div class="form-group"><label>Imóvel *</label><input type="text" id="fImovel"></div>
    <div class="form-group">
      <label>Tipo *</label>
      <select id="fTipo">
        <option value="Apartamento">Apartamento</option>
        <option value="Casa">Casa</option>
        <option value="Terreno">Terreno</option>
        <option value="Comercial">Comercial</option>
      </select>
    </div>
    <div class="form-group">
      <label>Valor Imóvel</label>
      <div class="input-currency-wrap"><input type="text" id="fValorImovel" oninput="maskCurrency(this)"></div>
    </div>
    <div style="display:flex; gap:10px">
      <div class="form-group" style="flex:1">
        <label>Comissão *</label>
        <div class="input-currency-wrap"><input type="text" id="fComissao" oninput="maskCurrency(this)"></div>
      </div>
      <div class="form-group" style="flex:1">
        <label>Gastos</label>
        <div class="input-currency-wrap"><input type="text" id="fGastos" oninput="maskCurrency(this)"></div>
      </div>
    </div>
    <div style="display:flex; gap:10px">
      <div class="form-group" style="flex:1"><label>Data Venda</label><input type="date" id="fDataVenda"></div>
      <div class="form-group" style="flex:1"><label>Data Receb.</label><input type="date" id="fDataReceb"></div>
    </div>
    <button class="btn-save" onclick="saveSale()">Salvar</button>
    <button class="btn-action" style="width:100%; margin-top:10px; border:none" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const STORAGE_KEY = 'rafaelSalesV2';
  let sales = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});

  function maskCurrency(input) {
    let v = input.value.replace(/\D/g, '');
    v = (parseInt(v, 10) || 0).toString();
    if (v.length === 1) v = '0,0' + v;
    else if (v.length === 2) v = '0,' + v;
    else {
      const cents = v.slice(-2);
      let reais = v.slice(0, -2).replace(/^0+/, '') || '0';
      reais = reais.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      v = reais + ',' + cents;
    }
    input.value = v;
  }

  function parseCurrency(str) {
    if (!str) return 0;
    return parseFloat(str.toString().replace(/\./g, '').replace(',', '.')) || 0;
  }

  function openModal() {
    ['fImovel', 'fValorImovel', 'fComissao', 'fGastos', 'fDataVenda', 'fDataReceb'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }

  function saveSale() {
    const imovel = document.getElementById('fImovel').value.trim();
    const comissao = parseCurrency(document.getElementById('fComissao').value);
    if (!imovel || !comissao) { alert('Preencha Imóvel e Comissão'); return; }

    sales.push({
      id: Date.now(),
      imovel,
      tipo: document.getElementById('fTipo').value,
      valorImovel: parseCurrency(document.getElementById('fValorImovel').value),
      comissao: comissao,
      gastos: parseCurrency(document.getElementById('fGastos').value),
      dataVenda: document.getElementById('fDataVenda').value,
      dataReceb: document.getElementById('fDataReceb').value
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
    renderTable(); calcKPIs(); closeModal();
  }

  function deleteSale(id) {
    if (confirm('Excluir registro?')) {
      sales = sales.filter(s => s.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
      renderTable(); calcKPIs();
    }
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const tbody = document.getElementById('salesTableBody');
    const filtered = sales.filter(s => s.imovel.toLowerCase().includes(q)).slice().reverse();

    tbody.innerHTML = filtered.map(s => {
      const lucro = (s.comissao || 0) - (s.gastos || 0);
      return `<tr>
        <td><strong>${s.imovel}</strong></td>
        <td><span class="badge">${s.tipo}</span></td>
        <td style="color:var(--muted)">${fmt(s.valorImovel)}</td>
        <td>${fmt(s.comissao)}</td>
        <td>${s.gastos > 0 ? fmt(s.gastos) : '—'}</td>
        <td class="${lucro >= 0 ? 'profit-pos' : 'profit-neg'}">${fmt(lucro)}</td>
        <td>${fmtDate(s.dataVenda)}</td>
        <td>${s.dataReceb ? fmtDate(s.dataReceb) : '<span style="color:#555">Pendente</span>'}</td>
        <td><button class="btn-delete" onclick="deleteSale(${s.id})">✕</button></td>
      </tr>`;
    }).join('');
  }

  function calcKPIs() {
    const profitEl = document.getElementById('kpiProfit');
    const totalLucro = sales.reduce((acc, s) => acc + (s.comissao || 0) - (s.gastos || 0), 0);
    profitEl.textContent = fmt(totalLucro);
    profitEl.className = totalLucro >= 0 ? 'kpi-value profit-pos' : 'kpi-value profit-neg';

    if(sales.length) {
      const freq = {};
      sales.forEach(s => freq[s.tipo] = (freq[s.tipo] || 0) + 1);
      document.getElementById('kpiTopType').textContent = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
      
      const dates = sales.filter(s => s.dataVenda && s.dataReceb);
      if(dates.length) {
        const avg = dates.reduce((acc, s) => acc + (new Date(s.dataReceb) - new Date(s.dataVenda))/86400000, 0) / dates.length;
        document.getElementById('kpiAvgDays').textContent = Math.max(0, Math.round(avg)) + ' dias';
      }
    }
  }

  function fmt(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
  function fmtDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }

  function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(sales.map(s => ({
      Imovel: s.imovel, Lucro: s.comissao - s.gastos, Data: s.dataVenda
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Vendas");
    XLSX.writeFile(wb, "Vendas.xlsx");
  }

  renderTable(); calcKPIs();
</script>
</body>
</html>
